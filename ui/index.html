<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SlackHog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="dark">
  <div id="sidebar">
    <div id="sidebar-header">
      <span class="sidebar-title">SlackHog</span>
      <button id="theme-toggle" title="Toggle theme">☀️</button>
    </div>
    <div id="channel-list"></div>
    <div id="sidebar-footer">
      <button id="clear-btn">Clear All</button>
    </div>
  </div>

  <div id="main">
    <div id="channel-header">
      <span id="channel-header-name"># all-channels</span>
    </div>
    <div id="message-list"></div>
  </div>

  <div id="thread-panel" class="thread-panel hidden">
    <div id="thread-header">
      <span id="thread-header-title">Thread</span>
      <button id="thread-close-btn">✕</button>
    </div>
    <div id="thread-parent"></div>
    <div class="thread-divider"><span>Replies</span></div>
    <div id="thread-replies"></div>
  </div>

  <script src="emoji.js"></script>
  <script src="app.js"></script>
</body>
</html>
